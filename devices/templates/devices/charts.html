<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Báo Cáo Trực Quan Hóa Dữ Liệu</title>
</head>
<body class="container mt-4">
    <h2>Trực Quan Hóa Thống Kê Thiết Bị</h2>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary mb-4">Quay lại Trang Chủ</a>

    <div class="row">
        <div class="col-md-6 text-center">
            <h4>Tỷ Lệ Thiết Bị Theo Thương Hiệu</h4>
            {% if pie_chart %}
                <img src="data:image/png;base64,{{ pie_chart }}" class="img-fluid" alt="Pie Chart">
            {% else %}
                <p class="text-muted">Không có dữ liệu hiển thị</p>
            {% endif %}
        </div>
        <div class="col-md-6 text-center">
            <h4>Giá Mua Trung Bình Theo Hãng</h4>
            {% if bar_chart %}
                <img src="data:image/png;base64,{{ bar_chart }}" class="img-fluid" alt="Bar Chart">
            {% else %}
                <p class="text-muted">Không có dữ liệu hiển thị</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
